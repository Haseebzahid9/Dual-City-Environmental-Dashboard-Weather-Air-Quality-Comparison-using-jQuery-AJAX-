<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AtmoSphere — Dual City Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="wrapper">

  <nav class="topbar">
    <div class="logo">Atmo<span>Sphere</span></div>
    <div class="toggle-wrap">
      <span class="toggle-label">Unit</span>
      <button class="toggle-btn" id="unitToggle">°C → °F</button>
      <span class="toggle-label" id="unitDisplay">Celsius</span>
    </div>
  </nav>

  <section class="search-section">
    <div class="city-input-group">
      <label class="city-label"><i class="bi bi-geo-alt"></i> City One</label>
      <div class="city-input-wrap">
        <input type="text" class="city-input" id="city1Input" placeholder="e.g. London, UK" />
        <button class="fetch-btn" id="fetchBtn1"><i class="bi bi-search"></i> Fetch</button>
      </div>
    </div>
    <div class="city-input-group">
      <label class="city-label"><i class="bi bi-geo-alt"></i> City Two</label>
      <div class="city-input-wrap">
        <input type="text" class="city-input" id="city2Input" placeholder="e.g. Tokyo, JP" />
        <button class="fetch-btn" id="fetchBtn2"><i class="bi bi-search"></i> Fetch</button>
      </div>
    </div>
  </section>

  <div class="alert-area">
    <div id="alert1"></div>
    <div id="alert2"></div>
  </div>

  <main class="dashboard">
    <div class="cities-grid">

      <div>
        <div class="skeleton-card" id="skel1">
          <div class="skel skel-h1"></div>
          <div class="skel skel-h2"></div>
          <div class="skel skel-row"></div>
          <div class="skel skel-row w85"></div>
          <div class="skel skel-row w70"></div>
        </div>
        <div class="city-card" id="card1"></div>
      </div>

      <div>
        <div class="skeleton-card" id="skel2">
          <div class="skel skel-h1"></div>
          <div class="skel skel-h2"></div>
          <div class="skel skel-row"></div>
          <div class="skel skel-row w85"></div>
          <div class="skel skel-row w70"></div>
        </div>
        <div class="city-card" id="card2"></div>
      </div>

    </div>

    <div class="compare-section" id="compareSection">
      <div class="compare-title"><i class="bi bi-bar-chart-line"></i> Side-by-Side Comparison</div>
      <table class="compare-table" id="compareTable"></table>
    </div>
  </main>

</div>

<button class="sidebar-toggle" id="sidebarToggle">
  <i class="bi bi-clock-history" style="writing-mode:horizontal-tb"></i>
  History
</button>

<aside class="history-sidebar" id="historySidebar">
  <div class="sidebar-head">
    <h5><i class="bi bi-clock-history"></i> Recent Searches</h5>
    <button class="close-sidebar" id="closeSidebar"><i class="bi bi-x-lg"></i></button>
  </div>
  <div id="historyList"></div>
</aside>

<script src="app.js"></script>
</body>
</html>
